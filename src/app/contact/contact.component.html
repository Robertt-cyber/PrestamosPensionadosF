<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="card-title mb-4 font-weight-bold" style="color: #002344;">
            <i class="fa fa-envelope mr-2" style="color: #BC955C;"></i>
            Contáctanos
          </h2>
          
          <form (ngSubmit)="enviarContacto()" #contactForm="ngForm">
            <div class="form-group mb-4">
              <label for="nombre" class="font-weight-bold" style="color: #002344;">Nombre Completo</label>
              <input 
                type="text" 
                class="form-control form-control-lg" 
                id="nombre" 
                placeholder="Tu nombre"
                [(ngModel)]="nombre"
                name="nombre"
                required>
            </div>

            <div class="form-group mb-4">
              <label for="email" class="font-weight-bold" style="color: #002344;">Correo Electrónico</label>
              <input 
                type="email" 
                class="form-control form-control-lg" 
                id="email" 
                placeholder="tu@correo.com"
                [(ngModel)]="email"
                name="email"
                required>
            </div>

            <div class="form-group mb-4">
              <label for="telefono" class="font-weight-bold" style="color: #002344;">Teléfono</label>
              <input 
                type="tel" 
                class="form-control form-control-lg" 
                id="telefono" 
                placeholder="Número de contacto"
                [(ngModel)]="telefono"
                name="telefono"
                required>
            </div>

            <div class="form-group mb-4">
              <label for="mensaje" class="font-weight-bold" style="color: #002344;">Mensaje</label>
              <textarea 
                class="form-control" 
                id="mensaje" 
                rows="5"
                placeholder="Tu mensaje aquí..."
                [(ngModel)]="mensaje"
                name="mensaje"
                required></textarea>
            </div>

            <button 
              type="submit" 
              class="btn btn-lg w-100 font-weight-bold"
              style="background-color: #BC955C; color: #002344; border: none;">
              <i class="fa fa-paper-plane mr-2"></i>
              Enviar Mensaje
            </button>
          </form>

          <div *ngIf="enviado" class="alert alert-success mt-4" role="alert">
            <i class="fa fa-check-circle mr-2"></i>
            ¡Mensaje enviado exitosamente! Te contactaremos pronto.
          </div>
        </div>
      </div>

      <div class="row mt-5">
        <div class="col-md-6 text-center mb-4">
          <div class="p-4">
            <i class="fa fa-phone fa-2x mb-3" style="color: #BC955C;"></i>
            <h5 style="color: #002344;">Teléfono</h5>
            <p><a href="tel:55298396" style="color: #002344; text-decoration: none;">55-29-83-96</a></p>
          </div>
        </div>
        <div class="col-md-6 text-center">
          <div class="p-4">
            <i class="fa fa-envelope fa-2x mb-3" style="color: #BC955C;"></i>
            <h5 style="color: #002344;">Email</h5>
            <p><a href="mailto:info@pestalmos.com" style="color: #002344; text-decoration: none;">info@pestalmos.com</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
